<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>$GODOT_PROJECT_NAME</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #canvas {
        display: block; width: 100%; height: 100%;
        /* Запрещаем браузеру перехватывать drag/pinch/select */
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-user-drag: none;
      }

      #game-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        transition: opacity 0.4s ease;
      }
      #game-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #game-loader img {
        width: 156px;
        height: 156px;
        object-fit: contain;
      }
      #game-loader span {
        color: #cce4ff;
        font-family: system-ui, sans-serif;
        font-size: 15px;
        letter-spacing: 0.06em;
        opacity: 0.75;
      }
      #loader-bar-bg {
        width: 200px;
        height: 6px;
        background: #0e1830;
        border-radius: 3px;
        overflow: hidden;
      }
      #loader-bar-fill {
        height: 100%;
        width: 0%;
        background: #4d9eff;
        border-radius: 3px;
        transition: width 0.2s ease;
      }
    </style>
    $GODOT_HEAD_INCLUDE
  </head>
  <body>
    <div id="game-loader">
      <span>Загрузка...</span>
      <img src="loader.gif" alt="">
      <div id="loader-bar-bg"><div id="loader-bar-fill"></div></div>
    </div>
    <canvas id="canvas"></canvas>

    <!--
      Yandex Games SDK.
      В архиве для консоли разработчика путь /sdk.js (относительный).
      На своём домене заменить на https://sdk.games.s3.yandex.net/sdk.js
    -->
    <script async src="/sdk.js" onload="initYandexSDK()"></script>
    <script>
      window.ysdk = null;

      async function initYandexSDK() {
        try {
          window.ysdk = await YaGames.init();

          // Форвардим системные события паузы в пользовательские события,
          // чтобы YandexSDK.gd мог подписаться через addEventListener.
          window.ysdk.on('game_api_pause', function () {
            window.dispatchEvent(new CustomEvent('__ysdk_pause'));
          });
          window.ysdk.on('game_api_resume', function () {
            window.dispatchEvent(new CustomEvent('__ysdk_resume'));
          });
        } catch (e) {
          console.warn('[YaSDK] init failed:', e);
        }
      }
    </script>

    <!-- JS-мост для GDScript. Загружается синхронно до старта движка. -->
    <script src="bridge.js"></script>

    <!-- Godot engine -->
    <script src="$GODOT_URL"></script>
    <script>
      var engine = new Engine($GODOT_CONFIG);
      var loaderFill = document.getElementById('loader-bar-fill');
      var loaderText = document.querySelector('#game-loader span');
      engine.startGame({
        canvas: document.getElementById('canvas'),
        onProgress: function (current, total) {
          if (total > 0 && loaderFill) {
            var pct = Math.min(90, Math.round(current / total * 100));
            loaderFill.style.width = pct + '%';
            if (pct >= 90 && loaderText) {
              loaderText.textContent = 'Инициализация...';
            }
          }
        }
      });

      // Pointer capture: при drag за границу canvas события не теряются
      var canvas = document.getElementById('canvas');
      canvas.addEventListener('pointerdown', function(e) {
        canvas.setPointerCapture(e.pointerId);
      });
    </script>

    <!-- Авто-обновление при деплое новой версии -->
    <script>
      (function() {
        var _loadedVersion = null;
        function checkVersion() {
          fetch('/version.json?_=' + Date.now(), { cache: 'no-store' })
            .then(function(r) { return r.json(); })
            .then(function(data) {
              if (_loadedVersion === null) {
                _loadedVersion = data.v;
              } else if (data.v !== _loadedVersion) {
                location.reload(true);
              }
            })
            .catch(function() {});
        }
        checkVersion();
        setInterval(checkVersion, 60000);
      })();
    </script>
  </body>
</html>
